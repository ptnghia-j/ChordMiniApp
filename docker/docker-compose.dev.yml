# ChordMiniApp Docker Compose Configuration
# Builds the frontend and backend images from this checkout.

name: chordminiapp

services:
  # Frontend - Next.js Application
  frontend:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runner
    container_name: chordmini-frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_TELEMETRY_DISABLED=${NEXT_TELEMETRY_DISABLED:-1}
      - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY:-}
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
      - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID:-}
      - NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID:-}
      - NEXT_PUBLIC_YOUTUBE_API_KEY=${NEXT_PUBLIC_YOUTUBE_API_KEY:-}
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      - NEXT_PUBLIC_AUDIO_STRATEGY=${NEXT_PUBLIC_AUDIO_STRATEGY:-auto}
      - NEXT_PUBLIC_ENABLE_SERVICE_WORKER=${NEXT_PUBLIC_ENABLE_SERVICE_WORKER:-false}
      - NEXT_PUBLIC_ENABLE_TRUE_STREAMING=${NEXT_PUBLIC_ENABLE_TRUE_STREAMING:-false}
      - NEXT_PUBLIC_SEGMENTATION_ACCESS_REQUEST_EMAIL=${NEXT_PUBLIC_SEGMENTATION_ACCESS_REQUEST_EMAIL:-phantrongnghia510@gmail.com}
      - NEXT_PUBLIC_RECAPTCHA_V3_SITE_KEY=${NEXT_PUBLIC_RECAPTCHA_V3_SITE_KEY:-}
      - NEXT_DISABLE_DEV_OVERLAY=${NEXT_DISABLE_DEV_OVERLAY:-true}
      - AUDIO_PROXY_FIREBASE_REDIRECT_ENABLED=${AUDIO_PROXY_FIREBASE_REDIRECT_ENABLED:-false}
      - PYTHON_API_URL=${PYTHON_API_URL:-http://backend:8080}
      # Backend URL used by the app's API health check.
      - NEXT_PUBLIC_PYTHON_API_URL=${NEXT_PUBLIC_PYTHON_API_URL:-http://backend:8080}
      - SONGFORMER_API_URL=${SONGFORMER_API_URL:-http://backend:8080}
      - SHEETSAGE_API_URL=${SHEETSAGE_API_URL:-http://backend:8080}
      - SONGFORMER_BACKEND_TIMEOUT_MS=${SONGFORMER_BACKEND_TIMEOUT_MS:-600000}
      - SONGFORMER_CALLBACK_BASE_URL=${SONGFORMER_CALLBACK_BASE_URL:-http://localhost:3000}
      - SHEETSAGE_BACKEND_TIMEOUT_MS=${SHEETSAGE_BACKEND_TIMEOUT_MS:-600000}
      - MUSIC_AI_API_KEY=${MUSIC_AI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GENIUS_API_KEY=${GENIUS_API_KEY:-}
      - SEGMENTATION_ACCESS_CODE=${SEGMENTATION_ACCESS_CODE:-}
      - CRON_SECRET=${CRON_SECRET:-replace_with_random_secret}
      - SEGMENTATION_STALE_JOB_CLEANUP_LIMIT=${SEGMENTATION_STALE_JOB_CLEANUP_LIMIT:-200}
      - FIREBASE_SERVICE_ACCOUNT_KEY=${FIREBASE_SERVICE_ACCOUNT_KEY:-}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-}
      - APPCHECK_ENFORCE=${APPCHECK_ENFORCE:-0}
      - USE_MOCK_MUSIC_AI=${USE_MOCK_MUSIC_AI:-false}
      - USE_FIREBASE_EMULATOR=${USE_FIREBASE_EMULATOR:-false}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - chordmini-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend - Python Flask ML Service
  backend:
    build:
      context: ../python_backend
      dockerfile: Dockerfile
      target: runtime
    container_name: chordmini-backend
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - FLASK_APP=app.py
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - PRODUCTION_MODE=true
      - DEFAULT_BEAT_MODEL=beat-transformer
      - DEFAULT_CHORD_MODEL=chord-cnn-lstm
      - MAX_CONTENT_LENGTH=104857600
      - UPLOAD_TIMEOUT=600
      # Rate limiting configuration
      - REDIS_URL=redis://redis:6379/0
      # Model configuration
      - USE_BEAT_TRANSFORMER=true
      - USE_CHORD_CNN_LSTM=true
      - USE_BTC_SL=true
      - USE_BTC_PL=true
    volumes:
      # Optional: Mount models directory for development
      # - ../python_backend/models:/app/models:ro
      # Mount cache directory for model caching
      - backend-cache:/tmp/model_cache
      - backend-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chordmini-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s

  # Redis for rate limiting and caching
  redis:
    image: redis:7-alpine
    container_name: chordmini-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - chordmini-network
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  chordmini-network:
    driver: bridge

volumes:
  backend-cache:
    name: chordmini-backend-cache
    driver: local
  backend-logs:
    name: chordmini-backend-logs
    driver: local
  redis-data:
    name: chordmini-redis-data
    driver: local
